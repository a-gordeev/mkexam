{% extends "base.html" %}
{% block title %}Import Deck — mkexam{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <h4 class="fw-bold mb-4">Import Deck</h4>

    <div class="card">
      <div class="card-body">
        <p class="text-muted small mb-3">
          Upload a <code>.json</code> deck file exported from mkexam to start studying.
        </p>
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label fw-semibold">Deck file (.json)</label>
            <input type="file" name="deck_file" class="form-control" accept=".json" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-upload"></i> Import
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
