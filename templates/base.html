<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}mkexam{% endblock %}</title>
  <script>
    (function() {
      const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-bs-theme', theme);
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        document.documentElement.setAttribute('data-bs-theme', e.matches ? 'dark' : 'light');
      });
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .card { border: none; box-shadow: var(--bs-box-shadow-sm); }
    .badge-mcq  { background: rgba(var(--bs-primary-rgb), .13); color: var(--bs-primary); }
    .badge-tf   { background: rgba(var(--bs-success-rgb), .13); color: var(--bs-success); }
    .badge-short{ background: rgba(var(--bs-orange-rgb),  .13); color: var(--bs-orange); }
    .badge-fitb { background: rgba(var(--bs-purple-rgb),  .13); color: var(--bs-purple); }
    .q-badge { font-size: .75rem; padding: .2em .55em; border-radius: 4px; font-weight: 600; }
    .model-card { transition: border-color .15s; }
    .model-card:hover { border-color: var(--bs-primary) !important; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <i class="bi bi-journal-check"></i> mkexam
    </a>
    <div class="ms-auto">
      {% if quiz_only %}
      <a href="{{ url_for('import_deck') }}" class="btn btn-sm btn-outline-light">
        <i class="bi bi-upload"></i> Import Deck
      </a>
      {% else %}
      <a href="{{ url_for('generate') }}" class="btn btn-sm btn-outline-light">
        <i class="bi bi-plus-lg"></i> New Deck
      </a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
